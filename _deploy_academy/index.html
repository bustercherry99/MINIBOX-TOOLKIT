<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiniBox Academy — PulmOne Rep Certification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rht:#1c6fb3; --rht-deep:#123f66; --rht-wash:#eef4fb; --rht-line:#d5e3f0;
  --rhink:#14283a; --rhsoft:#465f76; --rhg:#bd8730;
  --paper:#eaeef3; --card:#ffffff; --line:#dde4ec; --mute:#67809a;
  --pulm:#1c6fb3; --pulm-w:#e9f2fb; --allergy:#6d4bb0; --allergy-w:#f0ebfa;
  --univ:#1f9468; --univ-w:#e5f5ee; --cap:#bd8730; --cap-w:#fbf2df;
  --green:#1d7a46; --red:#c0392b;
  --display:"Space Grotesk",system-ui,sans-serif; --body:"Inter",system-ui,sans-serif; --mono:"IBM Plex Mono",monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--paper);color:var(--rhink);font-family:var(--body);-webkit-font-smoothing:antialiased}
body{max-width:940px;margin:0 auto;padding-bottom:70px}
h1,h2,h3,.disp{font-family:var(--display)}
button{font-family:inherit}

/* ---------------------------------------------------------------- header */
.hdr{position:sticky;top:0;z-index:20;background:linear-gradient(158deg,#122b40 0%,#184e7c 100%);color:#fff;padding:16px 20px 14px;
  box-shadow:0 6px 24px rgba(14,42,58,.28)}
.hdr-top{display:flex;align-items:center;gap:12px}
.hdr-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(140deg,#2a7fc4,#39aecf);
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.28)}
.hdr-logo svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.hdr-t{font-size:19px;font-weight:700;letter-spacing:-.3px;font-family:var(--display)}
.hdr-s{font-size:10px;color:#a9d6e2;font-weight:600;letter-spacing:.22em;text-transform:uppercase;margin-top:2px;font-family:var(--mono)}
.hdr-badge{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.1em;color:#0e2a3a;
  background:linear-gradient(135deg,#f4d78a,#e8b84e);border-radius:999px;padding:5px 12px;font-family:var(--mono)}

/* overall progress rail in the header */
.hdr-rail{margin-top:13px}
.hdr-rail-top{display:flex;justify-content:space-between;font-size:11px;color:#a9d6e2;font-family:var(--mono);letter-spacing:.06em;margin-bottom:5px}
.hdr-bar{height:7px;border-radius:99px;background:rgba(255,255,255,.16);overflow:hidden}
.hdr-bar i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,#39aecf,#7fe0c8);transition:width .5s}

/* ---------------------------------------------------------------- home */
.wrap{padding:20px 16px 0}
.lede{font-size:14.5px;line-height:1.62;color:var(--rhsoft);margin:2px 0 20px}
.lede b{color:var(--rhink)}
.sec-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);
  margin:26px 0 11px;display:flex;align-items:center;gap:10px}
.sec-h::after{content:"";flex:1;height:1px;background:var(--line)}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px 16px;text-align:left;
  cursor:pointer;display:flex;flex-direction:column;gap:10px;transition:.16s;position:relative;overflow:hidden}
.card:hover{border-color:var(--rht);box-shadow:0 6px 20px rgba(13,138,166,.12);transform:translateY(-1px)}
.card-top{display:flex;align-items:flex-start;gap:11px}
.card-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none}
.card-ico svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.card-t{font-family:var(--display);font-weight:700;font-size:15.5px;line-height:1.28;letter-spacing:-.2px}
.card-m{font-size:11.5px;color:var(--mute);margin-top:3px;font-family:var(--mono)}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:5px;font-family:var(--mono)}

/* the three-part progress strip on each card */
.trio{display:flex;gap:6px}
.trio-i{flex:1;border:1px solid var(--line);border-radius:8px;padding:6px 7px;background:#fafcfd}
.trio-l{font-size:9px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
.trio-v{font-size:12.5px;font-weight:700;margin-top:2px;color:var(--rhsoft)}
.trio-i.done{background:var(--univ-w);border-color:#bfe6d3}
.trio-i.done .trio-v{color:var(--green)}
.trio-i.locked{opacity:.5}

/* ---------------------------------------------------------------- overlay */
.ov{position:fixed;inset:0;z-index:50;background:var(--paper);display:none;flex-direction:column}
.ov.on{display:flex}
.ov-hd{background:linear-gradient(158deg,#122b40,#184e7c);color:#fff;padding:13px 16px 0;flex:none;
  box-shadow:0 4px 18px rgba(14,42,58,.22)}
.ov-hd-top{display:flex;align-items:center;gap:12px}
.ov-x{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);color:#fff;width:34px;height:34px;
  border-radius:9px;font-size:17px;cursor:pointer;flex:none;line-height:1}
.ov-title{font-family:var(--display);font-weight:700;font-size:16.5px;letter-spacing:-.2px}
.ov-sub{font-size:10.5px;color:#a9d6e2;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.ov-tabs{display:flex;gap:4px;margin:14px 0 13px;background:rgba(255,255,255,.09);border-radius:12px;padding:4px}
.ov-tabs button{flex:1;background:transparent;border:0;border-radius:9px;color:#c4dced;
  font-size:13px;font-weight:600;padding:9px 4px;cursor:pointer;font-family:var(--display);letter-spacing:.01em;transition:.15s}
.ov-tabs button.on{color:var(--rhink);background:#fff;box-shadow:0 2px 9px rgba(0,0,0,.22)}
.ov-tabs button:disabled{opacity:.3;cursor:not-allowed}
.ov-body{flex:1;overflow-y:auto;padding:18px 16px 40px;-webkit-overflow-scrolling:touch}

/* ---------------------------------------------------------------- study */
.st-intro{background:var(--rht-wash);border:1px solid var(--rht-line);border-radius:14px;padding:15px 16px;
  font-size:14.5px;line-height:1.62;color:var(--rht-deep);margin-bottom:22px}
.st-sec{margin-bottom:30px}
.st-h{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:-.3px;margin:0 0 9px;
  display:flex;align-items:baseline;gap:9px}
.st-h .n{font-family:var(--mono);font-size:11px;color:var(--rht);font-weight:600;flex:none}
.st-p{font-size:15px;line-height:1.68;color:var(--rhsoft);margin:0}
.st-p b{color:var(--rhink);font-weight:600}
.st-list{margin:11px 0 0;padding-left:19px;font-size:14.5px;line-height:1.62;color:var(--rhsoft)}
.st-list li{margin-bottom:6px}
.st-list b{color:var(--rhink)}
.st-key{margin-top:13px;background:var(--cap-w);border-left:3px solid var(--cap);border-radius:0 9px 9px 0;
  padding:10px 13px;font-size:13.5px;line-height:1.55;color:#6b4a12;font-weight:500}
.st-key::before{content:"Remember";display:block;font-family:var(--mono);font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--cap);margin-bottom:3px;font-weight:700}
.st-angle{margin-top:26px;background:linear-gradient(135deg,#122b40,#184e7c);color:#fff;border-radius:15px;padding:17px 18px}
.st-angle::before{content:"The MiniBox angle";display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;
  text-transform:uppercase;color:#7fe0c8;margin-bottom:7px;font-weight:700}
.st-angle p{margin:0;font-size:14.5px;line-height:1.66;color:#dbeef4}

/* figures */
.fig{margin:14px 0 0}
/* an image is never painted wider than its own pixels - upscaling a 275px slide
   diagram to the full 940px column is what made v3.0 look soft. Small art sits
   centred on its own card instead of being stretched into a blurry billboard. */
.fig-img{max-width:100%;width:auto;height:auto;border:1px solid var(--line);border-radius:12px;
  background:#fff;display:block;margin:0 auto;cursor:zoom-in}
.fig-small{background:#f6f9fa;border:1px solid var(--line);border-radius:14px;padding:16px;
  display:flex;justify-content:center}
.fig-small .fig-img{border:0;border-radius:8px;box-shadow:0 1px 3px rgba(8,24,33,.12)}
.fig-zoom.is-off{display:none}
.fig-cap{font-size:12.5px;line-height:1.5;color:var(--mute);margin-top:7px;padding-left:2px}
.fig-cap b{color:var(--rhsoft)}
.fig-zoom{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rht);
  margin-top:4px;display:block}

/* native tables, used instead of blurry slide screenshots */
.st-tbl{margin:14px 0 0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.st-tbl-scroll{overflow-x:auto}
.st-tbl table{border-collapse:collapse;width:100%;font-size:13.5px;min-width:420px}
.st-tbl th{background:var(--rht-wash);color:var(--rht-deep);font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;text-align:left;padding:9px 12px;font-weight:700;border-bottom:1px solid var(--rht-line);white-space:nowrap}
.st-tbl td{padding:9px 12px;border-bottom:1px solid var(--line);color:var(--rhsoft);line-height:1.5;vertical-align:top}
.st-tbl tr:last-child td{border-bottom:0}
.st-tbl td:first-child{color:var(--rhink);font-weight:600}
.st-tbl-note{font-size:11.5px;color:var(--mute);padding:8px 12px;background:#fafcfd;border-top:1px solid var(--line);line-height:1.5}

/* numbered steps */
.st-steps{margin:14px 0 0;display:flex;flex-direction:column;gap:9px}
.st-step{display:flex;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.st-step-n{width:26px;height:26px;border-radius:8px;background:var(--rht);color:#fff;font-family:var(--mono);
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.st-step-h{font-weight:700;font-size:14px;font-family:var(--display)}
.st-step-p{font-size:13.5px;line-height:1.55;color:var(--rhsoft);margin-top:3px}

/* this versus that */
.st-vs{margin:14px 0 0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.st-vs-col{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.st-vs-col:first-child{border-top:3px solid var(--pulm)}
.st-vs-col:last-child{border-top:3px solid var(--allergy)}
.st-vs-h{font-family:var(--display);font-weight:700;font-size:14.5px;margin-bottom:8px}
.st-vs-col:first-child .st-vs-h{color:var(--pulm)}
.st-vs-col:last-child .st-vs-h{color:var(--allergy)}
.st-vs ul{margin:0;padding-left:17px;font-size:13.5px;line-height:1.55;color:var(--rhsoft)}
.st-vs li{margin-bottom:5px}
@media(max-width:560px){.st-vs{grid-template-columns:1fr}}

.st-done{margin-top:24px;width:100%;padding:14px;border-radius:13px;border:0;background:var(--rht);color:#fff;
  font-size:14.5px;font-weight:700;cursor:pointer;font-family:var(--display)}
.st-done.is-done{background:var(--univ-w);color:var(--green);border:1px solid #bfe6d3}

/* ---------------------------------------------------------------- visuals */
.vis{margin:14px 0 0;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
.vis-svg{width:100%;height:auto;display:block}
.sp-gl{stroke:#e6eef1;stroke-width:1}
.fl-gl{stroke:#eef3f5;stroke-width:1}
.fl-gl.zero{stroke:#c3d4da;stroke-width:1.5}
.sp-ax{fill:var(--mute);font-size:11px;font-family:var(--mono);text-anchor:end}
.sp-ax.mid{text-anchor:middle}
.sp-axt{fill:var(--mute);font-size:10.5px;font-family:var(--mono);letter-spacing:.1em;text-anchor:middle;text-transform:uppercase}
.sp-trace{fill:none;stroke:var(--rht-deep);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
.sp-band{fill:rgba(13,138,166,.15)}
.sp-band.cap{fill:rgba(201,138,43,.17)}
.sp-tick{stroke:#b9ccd4;stroke-width:1;stroke-dasharray:3 3}
.sp-arrow{stroke:var(--rht);stroke-width:2.4}
.sp-arrow.cap{stroke:var(--cap)}
.sp-lab{fill:var(--rht);font-size:13px;font-weight:700;font-family:var(--display)}
.sp-lab.cap{fill:var(--cap)}
.sp-val{fill:var(--mute);font-size:11px;font-family:var(--mono)}
.fl-path{fill:rgba(13,138,166,.1);stroke:var(--rht-deep);stroke-width:2.4;stroke-linejoin:round}
.fl-ghost{fill:none;stroke:#c3d4da;stroke-width:1.6;stroke-dasharray:5 4}
.fl-side{fill:var(--mute);font-size:10px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase}

.vis-pills{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:12px}
.vis-pills-lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin-right:2px}
.vis-pills button{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;
  font-weight:600;color:var(--rhsoft);cursor:pointer;transition:.14s}
.vis-pills button:hover{border-color:var(--rht)}
.vis-pills button.on{background:var(--rht);border-color:var(--rht);color:#fff}
.vis-pills button.cap.on{background:var(--cap);border-color:var(--cap)}
.vis-pills button:disabled{opacity:.5;cursor:default}
.vis-read{margin-top:12px;background:var(--rht-wash);border-radius:10px;padding:11px 13px;font-size:13.5px;
  line-height:1.58;color:var(--rht-deep)}
.vis-read b{color:var(--rhink)}
.vis-read-v{font-family:var(--mono);font-size:12px;color:var(--rht);margin-left:6px}
.vis-check{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:12.5px;color:var(--mute);cursor:pointer}

/* gates */
.vis-gates{padding:8px}
.gate{width:100%;display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);
  border-radius:12px;padding:13px 14px;cursor:pointer;text-align:left;margin-top:8px}
.gate.on{border-color:var(--rht);background:var(--rht-wash)}
.gate-n{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--rht);flex:none}
.gate-b{flex:1}
.gate-t{display:block;font-family:var(--display);font-weight:700;font-size:15px}
.gate-q{display:block;font-size:12.5px;color:var(--mute);margin-top:1px}
.gate-chev{font-size:19px;color:var(--rht);font-family:var(--mono);flex:none}
.gate-body{display:none;padding:4px 6px 10px}
.gate-body.on{display:block}
.gate-m{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--mute);text-transform:uppercase;margin:8px 0 9px}
.gate-row{display:flex;gap:10px;padding:9px 11px;border-radius:9px;margin-bottom:6px;font-size:13.5px;line-height:1.5}
.gate-row b{flex:none;min-width:106px;font-family:var(--mono);font-size:11.5px}
.gate-row.ok{background:var(--univ-w);color:#1a5c39}
.gate-row.ok b{color:var(--green)}
.gate-row.no{background:#fdeceb;color:#7d2b22}
.gate-row.no b{color:var(--red)}
.gate-why{font-size:13px;line-height:1.58;color:var(--rhsoft);padding:4px 2px 0}

/* compartment bars */
.comp-wrap{display:flex;gap:14px;justify-content:center;align-items:flex-end;padding:10px 0 4px}
.comp-col{flex:1;max-width:150px;cursor:pointer}
.comp-stack{display:flex;flex-direction:column;justify-content:flex-end;border-radius:9px 9px 0 0;overflow:hidden}
.comp-seg{display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:#fff;
  font-family:var(--mono);overflow:hidden;transition:.2s}
.c-irv{background:#4aa8c4}.c-vt{background:#0d8aa6}.c-erv{background:#0a6075}.c-rv{background:#c98a2b}
.comp-col.on .comp-stack{outline:2px solid var(--rht);outline-offset:2px;border-radius:9px}
.comp-name{text-align:center;font-family:var(--display);font-weight:700;font-size:13px;margin-top:8px}
.comp-tlc{text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--mute);margin-top:2px}

/* dlco timeline */
.dl-trace{fill:none;stroke:#dbe6ea;stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
.dl-done{fill:none;stroke:var(--rht-deep);stroke-width:2.6;stroke-linejoin:round;stroke-linecap:round}
.dl-dot{fill:var(--rht);stroke:#fff;stroke-width:2.5;transition:opacity .2s}
.dl-zone.discard{fill:rgba(201,138,43,.16)}
.dl-zone.sample{fill:rgba(29,122,70,.16)}
.dl-zt{fill:var(--mute);font-size:9.5px;font-family:var(--mono);text-anchor:middle;letter-spacing:.1em;text-transform:uppercase}
.dl-hold{stroke:var(--cap);stroke-width:2;stroke-dasharray:4 3}
.dl-timer{fill:var(--rht-deep);font-family:var(--mono);font-size:14px;font-weight:600;text-anchor:middle}
.dl-count{font-family:var(--mono);font-size:11.5px;color:var(--rht);letter-spacing:.05em}
.dl-steps{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.dl-step{background:#fafcfd;border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;transition:.16s}
.dl-step.on{background:var(--rht-wash);border-color:var(--rht)}
.dl-step b{display:block;font-family:var(--display);font-size:13.5px;margin-bottom:2px}
.dl-step span{font-size:13px;line-height:1.52;color:var(--rhsoft)}

/* boyle */
.by-stage{display:flex;gap:20px;align-items:center;justify-content:center;padding:8px 0}
.by-cyl{position:relative;width:110px;height:190px;border:3px solid var(--rht-deep);border-top:0;
  border-radius:0 0 12px 12px;background:#f6fafb;overflow:hidden;flex:none}
.by-gas{position:absolute;left:0;right:0;bottom:0;background:rgba(13,138,166,.14);transition:height .12s}
.by-gas i{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--rht)}
.by-piston{position:absolute;left:-3px;right:-3px;height:14px;background:var(--rhg);border-radius:4px;transition:bottom .12s;z-index:2}
.by-piston span{position:absolute;left:50%;top:-26px;width:12px;height:26px;background:var(--rhg);transform:translateX(-50%);border-radius:3px}
.by-meters{display:flex;flex-direction:column;gap:9px}
.by-m{background:#fafcfd;border:1px solid var(--line);border-radius:10px;padding:9px 14px;min-width:126px}
.by-m.const{background:var(--univ-w);border-color:#bfe6d3}
.by-lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);display:block}
.by-m b{font-family:var(--mono);font-size:19px;color:var(--rht-deep)}
.by-m.const b{color:var(--green)}
.by-range{width:100%;margin-top:10px;accent-color:var(--rht)}
.by-hint{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin-top:5px}

/* ---------------------------------------------------------------- cards + test */
.q-prog{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:16px}
.q-prog i{display:block;height:100%;background:var(--rht);border-radius:99px;transition:width .3s}
.q-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--mute);
  letter-spacing:.08em;margin-bottom:12px;text-transform:uppercase}
.q-card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:20px 18px;margin-bottom:14px}
.q-q{font-size:17px;line-height:1.5;font-weight:600;font-family:var(--display);letter-spacing:-.2px}
.q-a{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-size:14.5px;line-height:1.64;color:var(--rhsoft)}
.q-btns{display:flex;gap:9px;margin-top:4px}
.q-btns button{flex:1;padding:13px;border-radius:12px;border:0;font-size:14.5px;font-weight:700;cursor:pointer;font-family:var(--display)}
.b-main{background:var(--rht);color:#fff}
.b-ok{background:var(--univ-w);color:var(--green);border:1px solid #bfe6d3!important}
.b-no{background:#fdeceb;color:var(--red);border:1px solid #f5c9c4!important}
.ch{display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:13px 15px;margin-bottom:8px;font-size:14.5px;line-height:1.5;cursor:pointer;color:var(--rhink);transition:.14s}
.ch:hover{border-color:var(--rht)}
.ch.right{background:var(--univ-w);border-color:var(--green);color:#155e38;font-weight:600}
.ch.wrong{background:#fdeceb;border-color:var(--red);color:#8c2f24}
.q-note{font-size:13.5px;line-height:1.6;color:var(--rhsoft);background:var(--rht-wash);border-radius:10px;padding:11px 13px;margin-top:10px}
.done-wrap{text-align:center;padding:26px 10px}
.done-pct{font-family:var(--mono);font-size:52px;font-weight:600;color:var(--rht-deep);line-height:1}
.done-t{font-family:var(--display);font-size:20px;font-weight:700;margin-top:8px}
.done-s{font-size:14px;color:var(--rhsoft);margin-top:7px;line-height:1.6}
.done-btns{display:flex;gap:9px;margin-top:20px}

/* ---------------------------------------------------------------- lightbox */
.lb{position:fixed;inset:0;z-index:90;background:rgba(8,24,33,.94);display:none;align-items:center;justify-content:center;padding:16px}
.lb.on{display:flex}
.lb img{max-width:100%;max-height:82vh;width:auto;height:auto;border-radius:10px;background:#fff}
.lb-cap{position:absolute;left:0;right:0;bottom:14px;text-align:center;color:#cfe6ec;font-size:13px;padding:0 24px;line-height:1.5}
.lb-x{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);
  color:#fff;width:38px;height:38px;border-radius:10px;font-size:19px;cursor:pointer}
.empty{padding:30px 16px;text-align:center;color:var(--mute);font-size:14px;line-height:1.6}

/* ---------------------------------------------------------------- mode pills
   The old three-tab bar became a scrollable row of study MODES. Learning
   science is clear that HOW you engage the same material (recall it, explain
   it, hear it) matters more than any "learning style"; these are the ways in. */
.ov-modes{display:flex;gap:6px;margin:14px -16px 13px;padding:2px 16px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ov-modes::-webkit-scrollbar{display:none}
.ov-modes button{flex:none;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:10px;
  color:#c4dced;font-size:13px;font-weight:600;padding:8px 13px;cursor:pointer;font-family:var(--display);
  letter-spacing:.01em;transition:.15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.ov-modes button .mi{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:none}
.ov-modes button.on{color:var(--rhink);background:#fff;box-shadow:0 2px 9px rgba(0,0,0,.22)}
.ov-modes button:disabled{opacity:.32;cursor:not-allowed}

/* the "why this works" strip that heads each active-study mode */
.md-why{display:flex;gap:10px;align-items:flex-start;background:var(--rht-wash);border:1px solid var(--rht-line);
  border-radius:12px;padding:11px 13px;margin-bottom:18px;font-size:13px;line-height:1.55;color:var(--rht-deep)}
.md-why svg{width:19px;height:19px;fill:none;stroke:var(--rht);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:none;margin-top:1px}
.md-why b{color:var(--rhink)}

/* ---------------------------------------------------------------- listen mode */
.ls-hero{background:linear-gradient(150deg,#122b40,#184e7c);border-radius:16px;padding:18px;color:#fff;margin-bottom:16px}
.ls-now{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7fe0c8}
.ls-line{font-family:var(--display);font-size:17px;font-weight:700;line-height:1.35;margin-top:6px;min-height:46px}
.ls-bar{height:5px;border-radius:99px;background:rgba(255,255,255,.16);overflow:hidden;margin-top:14px}
.ls-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#39aecf,#7fe0c8);transition:width .3s}
.ls-ctrls{display:flex;align-items:center;gap:10px;margin-top:14px}
.ls-play{width:52px;height:52px;border-radius:50%;border:0;background:#fff;color:var(--rht-deep);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 4px 14px rgba(0,0,0,.28)}
.ls-play svg{width:22px;height:22px;fill:currentColor}
.ls-mini{width:40px;height:40px;border-radius:11px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
.ls-mini svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ls-rate{margin-left:auto;display:flex;gap:4px}
.ls-rate button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#cfe6ec;border-radius:8px;
  font-family:var(--mono);font-size:11px;font-weight:600;padding:6px 9px;cursor:pointer}
.ls-rate button.on{background:#fff;color:var(--rht-deep);border-color:#fff}
.ls-list{display:flex;flex-direction:column;gap:6px}
.ls-item{display:flex;gap:11px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:11px;
  padding:11px 13px;cursor:pointer;transition:.14s}
.ls-item.on{border-color:var(--rht);background:var(--rht-wash)}
.ls-item.done{opacity:.62}
.ls-item-n{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--rht);width:20px;flex:none}
.ls-item-t{font-size:13.5px;font-weight:600;font-family:var(--display);line-height:1.3}
.ls-note{margin-top:14px;font-size:12px;color:var(--mute);line-height:1.55;text-align:center}

/* ---------------------------------------------------------------- teach back */
.tb-count{font-family:var(--mono);font-size:11px;color:var(--mute);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.tb-prompt{background:#fff;border:1px solid var(--line);border-top:3px solid var(--allergy);border-radius:15px;padding:18px 17px;margin-bottom:14px}
.tb-prompt-l{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--allergy);font-weight:700;margin-bottom:7px}
.tb-prompt-q{font-family:var(--display);font-size:17px;font-weight:700;line-height:1.4;letter-spacing:-.2px}
.tb-ta{width:100%;min-height:120px;border:1px solid var(--line);border-radius:13px;padding:13px 14px;font-family:var(--body);
  font-size:14.5px;line-height:1.6;color:var(--rhink);resize:vertical;background:#fff}
.tb-ta:focus{outline:none;border-color:var(--rht);box-shadow:0 0 0 3px var(--rht-wash)}
.tb-model{margin-top:14px;background:var(--univ-w);border:1px solid #bfe6d3;border-radius:13px;padding:15px 16px}
.tb-model-l{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);font-weight:700;margin-bottom:7px}
.tb-model-p{font-size:14.5px;line-height:1.64;color:#1a4a30}
.tb-model-mine{margin-top:12px;padding-top:12px;border-top:1px dashed #bfe6d3;font-size:13.5px;line-height:1.6;color:var(--rhsoft)}
.tb-model-mine b{color:var(--rhink);font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;display:block;margin-bottom:5px;color:var(--mute)}

/* ---------------------------------------------------------------- recall / brain dump */
.rc-prompt{background:linear-gradient(135deg,#122b40,#184e7c);color:#fff;border-radius:15px;padding:17px 18px;margin-bottom:14px}
.rc-prompt-l{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#7fe0c8;font-weight:700;margin-bottom:6px}
.rc-prompt-t{font-family:var(--display);font-size:18px;font-weight:700;line-height:1.35}
.rc-prompt-s{font-size:13px;color:#cfe6ec;margin-top:6px;line-height:1.5}
.rc-key{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.14s}
.rc-key.got{background:var(--univ-w);border-color:#bfe6d3}
.rc-box{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:none;display:flex;align-items:center;
  justify-content:center;margin-top:1px;color:transparent;font-size:14px;font-weight:800}
.rc-key.got .rc-box{background:var(--green);border-color:var(--green);color:#fff}
.rc-key-h{font-family:var(--display);font-weight:700;font-size:14px}
.rc-key-p{font-size:13px;line-height:1.55;color:var(--rhsoft);margin-top:2px}
.rc-score{text-align:center;font-family:var(--mono);font-size:12px;color:var(--mute);margin:16px 0 4px;letter-spacing:.06em}

/* ---------------------------------------------------------------- sharpen (home) */
.sharpen{background:linear-gradient(135deg,#122b40,#184e7c);border-radius:17px;padding:17px 18px;color:#fff;cursor:pointer;
  display:flex;align-items:center;gap:15px;margin-bottom:6px;border:0;width:100%;text-align:left;position:relative;overflow:hidden}
.sharpen::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(127,224,200,.13)}
.sharpen-ico{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;flex:none}
.sharpen-ico svg{width:26px;height:26px;fill:none;stroke:#7fe0c8;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.sharpen-t{font-family:var(--display);font-weight:700;font-size:16.5px;letter-spacing:-.2px}
.sharpen-s{font-size:12.5px;color:#cfe6ec;margin-top:3px;line-height:1.45}
.sharpen-n{margin-left:auto;font-family:var(--mono);font-size:11px;color:#0e2a3a;background:linear-gradient(135deg,#f4d78a,#e8b84e);
  border-radius:999px;padding:5px 11px;font-weight:700;flex:none;position:relative;z-index:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo"><svg viewBox="0 0 24 24"><path d="M12 4L2.5 8.5 12 13l9.5-4.5z"/><path d="M6.5 10.6v4.4c0 1.6 2.7 2.9 5.5 2.9s5.5-1.3 5.5-2.9v-4.4"/><path d="M21.5 8.5v5.2"/></svg></div>
    <div>
      <div class="hdr-t">MiniBox Academy</div>
      <div class="hdr-s">PulmOne Rep Certification</div>
    </div>
    <div class="hdr-badge" id="cert-badge">v3.0</div>
  </div>
  <div class="hdr-rail">
    <div class="hdr-rail-top"><span id="rail-l">Your progress</span><span id="rail-r"></span></div>
    <div class="hdr-bar"><i id="rail-bar"></i></div>
  </div>
</div>

<div class="wrap" id="home"></div>

<div class="ov" id="ov">
  <div class="ov-hd">
    <div class="ov-hd-top">
      <button class="ov-x" onclick="acClose()" aria-label="Close">&times;</button>
      <div>
        <div class="ov-title" id="ov-title"></div>
        <div class="ov-sub" id="ov-sub"></div>
      </div>
    </div>
    <div class="ov-modes" id="ov-modes">
      <button id="tab-study"  onclick="acTab('study')"><svg class="mi" viewBox="0 0 24 24"><path d="M4 5.5A2 2 0 0 1 6 4h5v15H6a2 2 0 0 0-2 1.5zM20 5.5A2 2 0 0 0 18 4h-5v15h5a2 2 0 0 1 2 1.5z"/></svg>Read</button>
      <button id="tab-listen" onclick="acTab('listen')"><svg class="mi" viewBox="0 0 24 24"><path d="M3 10v4h3l5 4V6L6 10z"/><path d="M16 8.5a5 5 0 0 1 0 7M18.5 6a8.5 8.5 0 0 1 0 12"/></svg>Listen</button>
      <button id="tab-learn"  onclick="acTab('learn')"><svg class="mi" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg>Flashcards</button>
      <button id="tab-teach"  onclick="acTab('teach')"><svg class="mi" viewBox="0 0 24 24"><path d="M4 5h16v10H8l-4 4z"/><path d="M8 9h8M8 12h5"/></svg>Teach&nbsp;back</button>
      <button id="tab-recall" onclick="acTab('recall')"><svg class="mi" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Recall</button>
      <button id="tab-test"   onclick="acTab('test')"><svg class="mi" viewBox="0 0 24 24"><path d="M9 11l2 2 4-4"/><path d="M5 4h14v16l-7-3-7 3z"/></svg>Test</button>
    </div>
  </div>
  <div class="ov-body" id="ov-body"></div>
</div>

<div class="lb" id="lb" onclick="acLbClose(event)">
  <button class="lb-x" onclick="acLbClose(event,1)" aria-label="Close">&times;</button>
  <img id="lb-img" alt="">
  <div class="lb-cap" id="lb-cap"></div>
</div>

<script src="academy-quiz.js"></script>
<script src="academy-study.js"></script>
<script src="academy-visuals.js"></script>
<script>
/* =====================================================================
   MiniBox Academy v3.0

   v2 was flashcards and a multiple choice test with no teaching in front
   of them, which is a quiz, not a course. v3 puts a visual Study layer
   first: real diagrams pulled out of PulmOne's own training decks, plus
   six hand-built interactive graphics for the ideas that only make sense
   when they move.

   Three data files feed this shell:
     academy-quiz.js    window.ACADEMY       titles, flashcards, test questions
     academy-study.js   window.ACADEMY_STUDY the lesson content
     academy-visuals.js window.ACADEMY_VIS   the interactive graphics
   ===================================================================== */

var A     = window.ACADEMY || {};
var CFG   = window.ACADEMY_CFG || { certPct: 80, icons: {}, tags: {}, pending: {} };
var STUDY = window.ACADEMY_STUDY || {};
var VIS   = window.ACADEMY_VIS || {};

/* ------------------------------------------------------------ storage */
function acRead(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d; } catch (e) { return d; } }
function acWrite(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }

function acScores()        { return acRead('academy-scores3', {}); }
function acSaveScore(k, p) { var s = acScores(); var o = s[k] || {}; s[k] = { last: p, best: Math.max(p, o.best || 0) }; acWrite('academy-scores3', s); }
function acBest(k)         { var s = acScores()[k]; return (s && s.best) || 0; }

function acStudied(k)      { return acRead('academy-studied3', {})[k] === 1; }
function acMarkStudied(k)  { var s = acRead('academy-studied3', {}); s[k] = 1; acWrite('academy-studied3', s); }

function acCardsDone(k)    { return acRead('academy-cards3', {})[k] === 1; }
function acMarkCards(k)    { var s = acRead('academy-cards3', {}); s[k] = 1; acWrite('academy-cards3', s); }

/* ------------------------------------------------------------ helpers */
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

var KEYS = Object.keys(A);
function isPending(k) { return !!(CFG.pending && CFG.pending[k]); }
function hasStudy(k)  { return !!(STUDY[k] && STUDY[k].sections && STUDY[k].sections.length); }
function hasCards(k)  { return !!(A[k] && A[k].learn && A[k].learn.length); }
function hasTest(k)   { return !!(A[k] && A[k].test && A[k].test.length) && !isPending(k); }

/* ------------------------------------------------------------ home */
function acHome() {
  var groups = [
    { t: 'Start here',            color: '#1c6fb3', keys: ['intro_mbp', 'clinical_overview', 'system_orientation'] },
    { t: 'The three measurements', color: '#0e8aa0', keys: ['spirometry', 'lung_volumes_pleth', 'lung_volume', 'dlco'] },
    { t: 'In the field',          color: '#5a6f93', keys: ['minibox_setup', 'additional_testing', 'respiratory_disease', 'competitive', 'pft_overview'] },
    { t: 'Certification',         color: '#bd8730', keys: ['final_exam'] }
  ];

  var seen = {}, html = '';
  html += '<p class="lede">Open any module and you get <b>six ways in</b>: read it, hear it, flip flashcards, ' +
          'teach it back, recall it cold, or take the test. Nobody has a single "learning style" — what actually ' +
          'sticks is hitting the same idea from a few different angles. Pick whichever fits the moment. ' +
          'Progress saves on this device.</p>';

  html += sharpenCardHtml();

  groups.forEach(function (g) {
    var keys = g.keys.filter(function (k) { return A[k] || STUDY[k]; });
    if (!keys.length) return;
    html += '<div class="sec-h">' + esc(g.t) + '</div><div class="cards">';
    keys.forEach(function (k) { seen[k] = 1; html += cardHtml(k, g.color); });
    html += '</div>';
  });

  // Anything not placed in a group above still gets shown.
  var rest = KEYS.filter(function (k) { return !seen[k]; });
  if (rest.length) {
    html += '<div class="sec-h">More</div><div class="cards">';
    rest.forEach(function (k) { html += cardHtml(k, '#5a6f93'); });
    html += '</div>';
  }

  document.getElementById('home').innerHTML = html;
  acRail();
}

/* one clean line icon per module - replaces the emoji set Erik flagged.
   24x24, stroke inherits the card tile's group colour. */
var ICONS = {
  intro_mbp:'<rect x="3" y="4.5" width="18" height="12.5" rx="2"/><path d="M8.5 20.5h7M12 17v3.5"/><path d="M12 8v5M9.5 10.5h5"/>',
  clinical_overview:'<path d="M5.5 3v4.5a3.8 3.8 0 0 0 7.6 0V3"/><path d="M9.3 11.3v2.4a5.2 5.2 0 0 0 9 3.5"/><circle cx="18.8" cy="8.8" r="2.1"/><path d="M18.8 10.9v2.3"/>',
  system_orientation:'<circle cx="12" cy="12" r="9"/><path d="M15.6 8.4l-2 5.2-5.2 2 2-5.2z"/><circle cx="12" cy="12" r="1.1" fill="currentColor" stroke="none"/>',
  minibox_setup:'<path d="M4 7h8.8M17.2 7h3M4 12h2.8M11.2 12h9M4 17h10.8M19.2 17h1"/><circle cx="15" cy="7" r="2.2"/><circle cx="9" cy="12" r="2.2"/><circle cx="17" cy="17" r="2.2"/>',
  pft_overview:'<rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V2.8h6V4"/><path d="M8 14h2l1.4-3.2 2.2 5 1.2-1.8H16"/>',
  spirometry:'<path d="M4 4v16h16" opacity=".4"/><path d="M4.6 19.4c3.2 0 3.8-11.4 7.4-11.4 3 0 3.2 6 7.4 6"/>',
  dlco:'<circle cx="8.5" cy="12" r="5"/><circle cx="8.5" cy="12" r="1.4" fill="currentColor" stroke="none"/><path d="M13.6 12h6"/><path d="M17 8.9l3.1 3.1-3.1 3.1"/>',
  lung_volume:'<rect x="6" y="3" width="12" height="18" rx="2"/><path d="M6 13c2-1.2 4-1.2 6 0s4 1.2 6 0"/><path d="M18 8h-2M18 17h-2" opacity=".55"/>',
  lung_volumes_pleth:'<rect x="3.5" y="6" width="17" height="14" rx="2"/><path d="M9 6V4h6v2"/><circle cx="12" cy="11.3" r="2.3"/><path d="M8.5 18c.6-2.2 6.4-2.2 7 0"/>',
  additional_testing:'<path d="M9 3h6M10 3.2v5.3l-4.6 8.1A2 2 0 0 0 7.2 20h9.6a2 2 0 0 0 1.8-3.4L14 8.5V3.2"/><path d="M7.7 15h8.6" opacity=".75"/>',
  respiratory_disease:'<circle cx="12" cy="12" r="9"/><path d="M8 12.2l2.6 2.8L16 9"/>',
  competitive:'<path d="M3 21h18" opacity=".55"/><rect x="5" y="11" width="3.6" height="8" rx="1"/><rect x="10.2" y="6" width="3.6" height="13" rx="1"/><rect x="15.4" y="14" width="3.6" height="5" rx="1"/>',
  final_exam:'<circle cx="12" cy="9" r="5.5"/><path d="M9.3 13.6L7.5 21l4.5-2.6L16.5 21l-1.8-7.4"/><path d="M9.6 9l1.7 1.7L14.6 7.4"/>'
};
function moduleIcon(k) {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" ' +
         'stroke-linecap="round" stroke-linejoin="round">' + (ICONS[k] || ICONS.pft_overview) + '</svg>';
}

function cardHtml(k, accent) {
  var m = A[k] || {}, s = STUDY[k] || {};
  var title = m.title || (s.title) || k;
  accent = accent || 'var(--rht)';
  var ico = moduleIcon(k);
  var mins = s.minutes ? s.minutes + ' min read' : '';
  var nCards = (m.learn || []).length, nTest = (m.test || []).length;

  var bits = [];
  if (mins) bits.push(mins);
  if (nCards) bits.push(nCards + ' cards');
  if (nTest) bits.push(nTest + ' questions');

  var tags = '';
  ((CFG.tags && CFG.tags[k]) || []).forEach(function (t) {
    tags += '<span class="tag" style="background:' + t.bg + ';color:' + t.c + '">' + esc(t.label) + '</span>';
  });

  var best = acBest(k);
  var trio = '' +
    '<div class="trio">' +
      trioCell('Study', hasStudy(k) ? (acStudied(k) ? 'Read' : (s.sections.length + ' parts')) : '—', hasStudy(k) && acStudied(k), !hasStudy(k)) +
      trioCell('Cards', hasCards(k) ? (acCardsDone(k) ? 'Done' : nCards) : '—', hasCards(k) && acCardsDone(k), !hasCards(k)) +
      trioCell('Test', hasTest(k) ? (best ? best + '%' : nTest) : (isPending(k) ? 'Locked' : '—'), best >= (CFG.certPct || 80), !hasTest(k)) +
    '</div>';

  return '<div class="card" onclick="acOpen(\'' + k + '\')">' +
           '<div class="card-top"><div class="card-ico" style="color:' + accent + ';background:' + accent + '14;box-shadow:inset 0 0 0 1px ' + accent + '26">' + ico + '</div>' +
           '<div><div class="card-t">' + esc(title) + '</div>' +
           '<div class="card-m">' + esc(bits.join(' · ')) + '</div>' +
           (tags ? '<div class="card-tags">' + tags + '</div>' : '') + '</div></div>' + trio + '</div>';
}

function trioCell(label, value, done, locked) {
  return '<div class="trio-i' + (done ? ' done' : '') + (locked ? ' locked' : '') + '">' +
         '<div class="trio-l">' + label + '</div><div class="trio-v">' + esc(value) + '</div></div>';
}

function acRail() {
  // One point per available piece of work across every module.
  var total = 0, got = 0;
  KEYS.concat(Object.keys(STUDY)).filter(function (v, i, a) { return a.indexOf(v) === i; }).forEach(function (k) {
    if (hasStudy(k)) { total++; if (acStudied(k)) got++; }
    if (hasCards(k)) { total++; if (acCardsDone(k)) got++; }
    if (hasTest(k))  { total++; if (acBest(k) >= (CFG.certPct || 80)) got++; }
  });
  var pct = total ? Math.round((got / total) * 100) : 0;
  document.getElementById('rail-bar').style.width = pct + '%';
  document.getElementById('rail-r').textContent = got + ' of ' + total + ' complete';
  document.getElementById('cert-badge').textContent = pct === 100 ? 'CERTIFIED' : pct + '%';
}

/* ------------------------------------------------------------ overlay */
var curKey = '', curTab = 'study';

function acOpen(k) {
  curKey = k;
  var m = A[k] || {}, s = STUDY[k] || {};
  document.getElementById('ov-title').textContent = m.title || s.title || k;
  document.getElementById('ov-sub').textContent =
    (hasStudy(k) ? (s.minutes || 0) + ' min read' : 'Module');
  document.getElementById('tab-study').disabled  = !hasStudy(k);
  document.getElementById('tab-listen').disabled = !hasStudy(k);
  document.getElementById('tab-learn').disabled  = !hasCards(k);
  document.getElementById('tab-teach').disabled  = !hasCards(k);
  document.getElementById('tab-recall').disabled = !hasStudy(k);
  document.getElementById('tab-test').disabled   = !hasTest(k);
  document.getElementById('ov').classList.add('on');
  document.body.style.overflow = 'hidden';
  document.getElementById('ov-modes').style.display = '';   // Sharpen hides it; restore for real modules
  document.getElementById('ov-modes').scrollLeft = 0;
  acTab(hasStudy(k) ? 'study' : (hasCards(k) ? 'learn' : 'test'));
}

function acClose() {
  document.getElementById('ov').classList.remove('on');
  document.body.style.overflow = '';
  if (window.speechSynthesis) speechSynthesis.cancel();
  acHome();
}

var MODES = ['study', 'listen', 'learn', 'teach', 'recall', 'test'];
function acTab(t) {
  if (window.speechSynthesis) speechSynthesis.cancel();   // leaving Listen? stop the voice
  curTab = t;
  MODES.forEach(function (x) {
    var el = document.getElementById('tab-' + x);
    if (el) el.classList.toggle('on', x === t);
  });
  var body = document.getElementById('ov-body');
  body.scrollTop = 0;
  if (t === 'study')       renderStudy(body);
  else if (t === 'listen') renderListen(body);
  else if (t === 'teach')  renderTeach(body);
  else if (t === 'recall') renderRecall(body);
  else                     startQuiz(t);   // 'learn' or 'test'
}

/* ------------------------------------------------------------ study renderer */
function renderStudy(body) {
  var s = STUDY[curKey];
  if (!s) { body.innerHTML = '<div class="empty">No study material for this module yet.</div>'; return; }

  var h = '';
  if (s.intro) h += '<div class="st-intro">' + s.intro + '</div>';

  (s.sections || []).forEach(function (sec, i) {
    h += '<div class="st-sec">';
    h += '<h3 class="st-h"><span class="n">' + String(i + 1).padStart(2, '0') + '</span><span>' + sec.h + '</span></h3>';
    if (sec.p) h += '<p class="st-p">' + sec.p + '</p>';
    if (sec.list && sec.list.length) {
      h += '<ul class="st-list">';
      sec.list.forEach(function (li) { h += '<li>' + li + '</li>'; });
      h += '</ul>';
    }
    if (sec.visual) h += visualHtml(sec.visual, i);
    if (sec.key) h += '<div class="st-key">' + sec.key + '</div>';
    h += '</div>';
  });

  if (s.angle) h += '<div class="st-angle"><p>' + s.angle + '</p></div>';

  var done = acStudied(curKey);
  h += '<button class="st-done' + (done ? ' is-done' : '') + '" id="st-done">' +
       (done ? '✓ Marked as read' : 'Mark this module as read') + '</button>';

  body.innerHTML = h;

  // Wire up the interactive visuals now that they are in the document.
  (s.sections || []).forEach(function (sec, i) {
    if (sec.visual && sec.visual.t === 'svg' && VIS[sec.visual.id]) {
      var host = document.getElementById('vis-' + i);
      if (host) { try { VIS[sec.visual.id].init(host); } catch (e) { console.warn('visual', sec.visual.id, e); } }
    }
  });

  document.getElementById('st-done').onclick = function () {
    acMarkStudied(curKey);
    this.classList.add('is-done');
    this.textContent = '✓ Marked as read';
    acRail();
  };
}

/* Called as each figure loads. Art that is narrower than the column gets framed
   rather than stretched, and "tap to enlarge" is hidden when the image is already
   showing every pixel it has - offering a zoom that cannot sharpen anything is a lie. */
function acFigFit(img) {
  var fig = img.parentNode;
  if (!fig || !img.naturalWidth) return;
  var col = fig.clientWidth || 900;
  if (img.naturalWidth < col - 24) fig.classList.add('fig-small');
  var hint = fig.querySelector('.fig-zoom');
  if (hint && img.naturalWidth <= img.clientWidth + 2) hint.classList.add('is-off');
}

function visualHtml(v, i) {
  if (!v) return '';

  if (v.t === 'img') {
    var src = 'academy-assets/' + v.src + '.jpg';
    return '<div class="fig">' +
             '<img class="fig-img" src="' + src + '" alt="' + esc(v.cap || '') + '" loading="lazy" ' +
             'onload="acFigFit(this)" onclick="acLb(this.src, this.alt)">' +
             (v.cap ? '<div class="fig-cap">' + v.cap + '</div>' : '') +
             '<span class="fig-zoom">Tap to enlarge</span>' +
           '</div>';
  }

  if (v.t === 'table') {
    var t = '<div class="st-tbl"><div class="st-tbl-scroll"><table>';
    if (v.head && v.head.length) {
      t += '<thead><tr>';
      v.head.forEach(function (c) { t += '<th>' + c + '</th>'; });
      t += '</tr></thead>';
    }
    t += '<tbody>';
    (v.rows || []).forEach(function (r) {
      t += '<tr>';
      r.forEach(function (c) { t += '<td>' + c + '</td>'; });
      t += '</tr>';
    });
    t += '</tbody></table></div>';
    if (v.note) t += '<div class="st-tbl-note">' + v.note + '</div>';
    return t + '</div>';
  }

  if (v.t === 'steps') {
    var st = '<div class="st-steps">';
    (v.items || []).forEach(function (it, n) {
      st += '<div class="st-step"><div class="st-step-n">' + (n + 1) + '</div><div>' +
            '<div class="st-step-h">' + it.h + '</div>' +
            (it.p ? '<div class="st-step-p">' + it.p + '</div>' : '') + '</div></div>';
    });
    return st + '</div>';
  }

  if (v.t === 'vs') {
    function col(c) {
      var o = '<div class="st-vs-col"><div class="st-vs-h">' + (c.h || '') + '</div><ul>';
      (c.items || []).forEach(function (x) { o += '<li>' + x + '</li>'; });
      return o + '</ul></div>';
    }
    return '<div class="st-vs">' + col(v.a || {}) + col(v.b || {}) + '</div>';
  }

  if (v.t === 'svg') {
    var comp = VIS[v.id];
    if (!comp) return '';
    return '<div id="vis-' + i + '">' + comp.html() + '</div>';
  }

  return '';
}

/* ------------------------------------------------------------ lightbox */
function acLb(src, cap) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-cap').innerHTML = cap || '';
  document.getElementById('lb').classList.add('on');
}
function acLbClose(e, force) {
  if (!force && e && e.target.tagName === 'IMG') return;
  document.getElementById('lb').classList.remove('on');
}

/* ------------------------------------------------------------ quiz engine */
var qList = [], qi = 0, qFlipped = false, qPicked = null, qRight = 0, qSeen = 0, qMissed = [];

function startQuiz(mode) {
  var m = A[curKey] || {};
  if (mode === 'learn') qList = shuffle((m.learn || []).map(function (c) { return { q: c.q, a: c.a, _key: curKey }; }));
  else qList = shuffle((m.test || []).map(function (c) { return { q: c.q, choices: c.choices.slice(), correct: c.correct, note: c.note, _key: curKey }; }));
  qi = 0; qFlipped = false; qPicked = null; qRight = 0; qSeen = 0; qMissed = [];
  renderQuiz();
}

function renderQuiz() {
  var body = document.getElementById('ov-body');
  if (qi >= qList.length) return finishQuiz();

  var c = qList[qi];
  var h = '<div class="q-prog"><i style="width:' + Math.round((qi / qList.length) * 100) + '%"></i></div>' +
          '<div class="q-meta"><span>' + (curTab === 'test' ? 'Question' : 'Card') + ' ' + (qi + 1) + ' of ' + qList.length + '</span>' +
          '<span>' + qRight + ' right</span></div>';

  if (curTab === 'sharpen' && c._key && (A[c._key] || STUDY[c._key])) {
    h += '<div class="tb-count">From ' + esc((A[c._key] || STUDY[c._key]).title || c._key) + '</div>';
  }

  h += '<div class="q-card"><div class="q-q">' + c.q + '</div>';

  if (curTab !== 'test') {
    if (qFlipped) h += '<div class="q-a">' + c.a + '</div>';
    h += '</div>';
    if (!qFlipped) h += '<div class="q-btns"><button class="b-main" onclick="qFlip()">Show the answer</button></div>';
    else h += '<div class="q-btns"><button class="b-no" onclick="qNextLearn(0)">Missed it</button>' +
              '<button class="b-ok" onclick="qNextLearn(1)">Got it</button></div>';
  } else {
    h += '</div>';
    c.choices.forEach(function (ch, i) {
      var cls = '';
      if (qPicked !== null) {
        if (i === c.correct) cls = ' right';
        else if (i === qPicked) cls = ' wrong';
      }
      h += '<button class="ch' + cls + '" onclick="qAnswer(' + i + ')">' + ch + '</button>';
    });
    if (qPicked !== null) {
      if (c.note) h += '<div class="q-note">' + c.note + '</div>';
      h += '<div class="q-btns"><button class="b-main" onclick="qNextTest()">Next</button></div>';
    }
  }

  document.getElementById('ov-body').innerHTML = h;
}

function qFlip() { qFlipped = true; renderQuiz(); }

function qNextLearn(got) {
  var c = qList[qi];
  if (!c._scored) {
    c._scored = true; qSeen++;
    if (got) { qRight++; acClearMiss(c._key, c.q); }
    else { qMissed.push(c); acLogMiss(c._key, { q: c.q, a: c.a }); }
  }
  qi++; qFlipped = false; renderQuiz();
}

function qAnswer(i) {
  if (qPicked !== null) return;
  var c = qList[qi];
  qPicked = i; qSeen++;
  if (i === c.correct) { qRight++; acClearMiss(c._key, c.q); }
  else {
    qMissed.push(c);
    var ans = c.choices[c.correct];
    if (c.note) ans += ' — ' + acPlain(c.note);
    acLogMiss(c._key, { q: c.q, a: ans });
  }
  renderQuiz();
}

function qNextTest() {
  var c = qList[qi];
  // A missed question goes back in the deck so it comes round again.
  if (qPicked !== c.correct) qList.push(qList.splice(qi, 1)[0]);
  else qi++;
  qPicked = null;
  renderQuiz();
}

function finishQuiz() {
  var pct = qSeen ? Math.round((qRight / qSeen) * 100) : 0;
  var pass = pct >= (CFG.certPct || 80);

  if (curTab === 'test') acSaveScore(curKey, pct);
  else if (curTab === 'learn') acMarkCards(curKey);
  // 'sharpen' saves nothing to a module — the misses it clears are its own record.
  acRail();

  var title = curTab === 'test' ? (pass ? 'Passed' : 'Not there yet')
            : curTab === 'sharpen' ? 'Review done' : 'Deck complete';
  var h = '<div class="done-wrap">' +
          '<div class="done-pct">' + pct + '%</div>' +
          '<div class="done-t">' + title + '</div>' +
          '<div class="done-s">' + qRight + ' of ' + qSeen + ' right' +
          (curTab === 'test' && !pass ? '<br>You need ' + (CFG.certPct || 80) + '% to clear this module.' : '') +
          (curTab === 'sharpen' ? '<br>The ones you got clear off your review pile.' : '') +
          '</div><div class="done-btns">';

  if (qMissed.length) h += '<button class="b-no" style="flex:1;padding:13px;border-radius:12px;font-weight:700;cursor:pointer" onclick="qRetry()">Redo the ' + qMissed.length + ' missed</button>';
  h += '<button class="b-main" style="flex:1;padding:13px;border-radius:12px;border:0;font-weight:700;cursor:pointer" onclick="acClose()">Back to modules</button>';
  h += '</div></div>';

  document.getElementById('ov-body').innerHTML = h;
}

function qRetry() {
  qList = qMissed.map(function (c) {
    return curTab === 'test' ? { q: c.q, choices: c.choices.slice(), correct: c.correct, note: c.note, _key: c._key }
                             : { q: c.q, a: c.a, _key: c._key };
  });
  qi = 0; qFlipped = false; qPicked = null; qRight = 0; qSeen = 0; qMissed = [];
  renderQuiz();
}

/* =====================================================================
   MORE WAYS TO STUDY
   The research is blunt: matching a lesson to someone's supposed "learning
   style" (visual / auditory) does nothing. What actually moves retention is
   engaging the SAME material through effortful, varied paths - hearing it,
   recalling it cold, explaining it, and spacing the review. Every mode below
   is built straight from the existing Study text and flashcards, so it works
   on every module automatically, DLCO included.
   ===================================================================== */

/* strip HTML down to speakable / plain text */
function acPlain(html) {
  var d = document.createElement('div');
  d.innerHTML = String(html == null ? '' : html);
  return (d.textContent || d.innerText || '').replace(/\s+/g, ' ').trim();
}

/* small header that names the strategy and why it works */
function whyStrip(txt) {
  return '<div class="md-why"><svg viewBox="0 0 24 24"><path d="M9 18h6M10 21h4"/>' +
         '<path d="M12 3a6 6 0 0 0-4 10.5c.7.6 1 1 1 2v.5h6V15c0-1 .3-1.4 1-2A6 6 0 0 0 12 3z"/></svg>' +
         '<div>' + txt + '</div></div>';
}

/* --------------------------------------------------------- LISTEN (hear it) */
var lsChunks = [], lsIdx = 0, lsPlaying = false, lsRate = 1;

function acBuildChunks(s) {
  var out = [];
  if (s.intro) out.push({ label: 'Introduction', text: acPlain(s.intro) });
  (s.sections || []).forEach(function (sec) {
    var t = sec.h + '. ' + acPlain(sec.p || '');
    (sec.list || []).forEach(function (li) { t += ' ' + acPlain(li) + '.'; });
    if (sec.key) t += ' Remember: ' + acPlain(sec.key);
    out.push({ label: sec.h, text: t });
  });
  if (s.angle) out.push({ label: 'The MiniBox angle', text: acPlain(s.angle) });
  return out;
}

function renderListen(body) {
  var s = STUDY[curKey];
  if (!s) { body.innerHTML = '<div class="empty">Nothing to play for this module yet.</div>'; return; }
  if (!('speechSynthesis' in window)) {
    body.innerHTML = whyStrip('<b>Listen</b> reads the module aloud so you can study hands-free — in the car, between calls.') +
      '<div class="empty">This browser can\'t read text aloud. Open <b>Read</b> instead, or try Listen on your phone.</div>';
    return;
  }
  lsChunks = acBuildChunks(s);
  if (lsIdx >= lsChunks.length) lsIdx = 0;
  lsPaint();
}

function lsPaint() {
  var body = document.getElementById('ov-body');
  var cur = lsChunks[lsIdx] || { label: '', text: '' };
  var pct = lsChunks.length ? Math.round((lsIdx / lsChunks.length) * 100) : 0;

  var h = whyStrip('<b>Listen.</b> Hearing the material is a second route into memory (what researchers call dual coding). Perfect for the car or between calls.');
  h += '<div class="ls-hero">' +
         '<div class="ls-now">Now playing · ' + (lsIdx + 1) + ' of ' + lsChunks.length + '</div>' +
         '<div class="ls-line">' + esc(cur.label) + '</div>' +
         '<div class="ls-bar"><i style="width:' + pct + '%"></i></div>' +
         '<div class="ls-ctrls">' +
           '<button class="ls-play" onclick="lsToggle()" aria-label="Play or pause">' +
             (lsPlaying
               ? '<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>'
               : '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>') +
           '</button>' +
           '<button class="ls-mini" onclick="lsStep(-1)" aria-label="Previous"><svg viewBox="0 0 24 24"><path d="M18 6L9 12l9 6zM7 6v12"/></svg></button>' +
           '<button class="ls-mini" onclick="lsStep(1)" aria-label="Next"><svg viewBox="0 0 24 24"><path d="M6 6l9 6-9 6zM17 6v12"/></svg></button>' +
           '<div class="ls-rate">' +
             [0.9, 1, 1.25, 1.5].map(function (r) {
               return '<button class="' + (lsRate === r ? 'on' : '') + '" onclick="lsSetRate(' + r + ')">' + r + '×</button>';
             }).join('') +
           '</div>' +
         '</div>' +
       '</div>';

  h += '<div class="ls-list">';
  lsChunks.forEach(function (c, i) {
    h += '<div class="ls-item' + (i === lsIdx ? ' on' : '') + (i < lsIdx ? ' done' : '') + '" onclick="lsJump(' + i + ')">' +
           '<div class="ls-item-n">' + String(i + 1).padStart(2, '0') + '</div>' +
           '<div class="ls-item-t">' + esc(c.label) + '</div>' +
         '</div>';
  });
  h += '</div>';
  h += '<div class="ls-note">Tap any part to jump there. Audio uses your device\'s built-in voice.</div>';

  body.innerHTML = h;
}

function lsSpeak() {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var c = lsChunks[lsIdx];
  if (!c) { lsPlaying = false; lsPaint(); return; }
  var u = new SpeechSynthesisUtterance(c.text);
  u.rate = lsRate;
  u.onend = function () {
    if (!lsPlaying) return;
    if (lsIdx < lsChunks.length - 1) { lsIdx++; lsSpeak(); lsPaint(); }
    else { lsPlaying = false; lsIdx = 0; lsPaint(); }
  };
  speechSynthesis.speak(u);
}
function lsToggle() {
  lsPlaying = !lsPlaying;
  if (lsPlaying) lsSpeak(); else speechSynthesis.cancel();
  lsPaint();
}
function lsStep(d) {
  lsIdx = Math.max(0, Math.min(lsChunks.length - 1, lsIdx + d));
  if (lsPlaying) lsSpeak();
  lsPaint();
}
function lsJump(i) {
  lsIdx = i;
  if (lsPlaying) lsSpeak();
  lsPaint();
}
function lsSetRate(r) {
  lsRate = r;
  if (lsPlaying) lsSpeak();
  lsPaint();
}

/* --------------------------------------------------------- TEACH BACK (explain it) */
var tbList = [], tbIdx = 0, tbRevealed = false, tbText = '';

function renderTeach(body) {
  var m = A[curKey] || {};
  if (!(m.learn && m.learn.length)) { body.innerHTML = '<div class="empty">No prompts to teach back yet.</div>'; return; }
  tbList = shuffle(m.learn.map(function (c) { return { q: c.q, a: c.a }; }));
  tbIdx = 0; tbRevealed = false; tbText = '';
  tbPaint();
}

function tbCapture() {
  var ta = document.getElementById('tb-ta');
  if (ta) tbText = ta.value;
}

function tbPaint() {
  var body = document.getElementById('ov-body');
  if (tbIdx >= tbList.length) return tbDone();
  var c = tbList[tbIdx];

  var h = whyStrip('<b>Teach it back.</b> Explaining an idea in your own plain words (the Feynman technique) exposes the gaps that just re-reading hides. Say it out loud or type it — then check yourself.');
  h += '<div class="tb-count">Prompt ' + (tbIdx + 1) + ' of ' + tbList.length + '</div>';
  h += '<div class="tb-prompt"><div class="tb-prompt-l">Explain this like the buyer is in front of you</div>' +
       '<div class="tb-prompt-q">' + c.q + '</div></div>';
  h += '<textarea class="tb-ta" id="tb-ta" placeholder="In your own words…">' + esc(tbText) + '</textarea>';

  if (!tbRevealed) {
    h += '<div class="q-btns" style="margin-top:12px"><button class="b-main" onclick="tbReveal()">Reveal the model answer</button></div>';
  } else {
    h += '<div class="tb-model"><div class="tb-model-l">Model answer</div><div class="tb-model-p">' + c.a + '</div>';
    if (tbText.trim()) h += '<div class="tb-model-mine"><b>What you said</b>' + esc(tbText) + '</div>';
    h += '</div>';
    h += '<div class="q-btns" style="margin-top:14px">' +
           '<button class="b-no" onclick="tbNext(0)">Missed something</button>' +
           '<button class="b-ok" onclick="tbNext(1)">Nailed it</button>' +
         '</div>';
  }
  body.innerHTML = h;
}

function tbReveal() { tbCapture(); tbRevealed = true; tbPaint(); }
function tbNext(got) {
  var c = tbList[tbIdx];
  if (!got) acLogMiss(curKey, { q: c.q, a: c.a });
  else acClearMiss(curKey, c.q);
  tbIdx++; tbRevealed = false; tbText = '';
  tbPaint();
}
function tbDone() {
  document.getElementById('ov-body').innerHTML =
    '<div class="done-wrap"><div class="done-pct">✓</div>' +
    '<div class="done-t">You taught the whole module</div>' +
    '<div class="done-s">Anything you flagged as shaky is waiting for you in Sharpen.</div>' +
    '<div class="done-btns"><button class="b-main" style="flex:1;padding:13px;border-radius:12px;border:0;font-weight:700;cursor:pointer" onclick="acClose()">Back to modules</button></div></div>';
}

/* --------------------------------------------------------- RECALL (dump it cold) */
var rcKeys = [], rcRevealed = false, rcGot = {}, rcText = '';

function renderRecall(body) {
  var s = STUDY[curKey];
  if (!s || !(s.sections && s.sections.length)) { body.innerHTML = '<div class="empty">No material to recall yet.</div>'; return; }
  rcKeys = s.sections.map(function (sec) {
    return { h: sec.h, p: acPlain(sec.key || sec.p || '') };
  });
  rcRevealed = false; rcGot = {}; rcText = '';
  rcPaint();
}

function rcPaint() {
  var body = document.getElementById('ov-body');
  var title = (A[curKey] && A[curKey].title) || (STUDY[curKey] && STUDY[curKey].title) || 'this module';

  var h = whyStrip('<b>Recall.</b> Pulling it out of your head cold — retrieval practice — builds far stronger memory than reading it again. Struggling a little is the point.');
  h += '<div class="rc-prompt"><div class="rc-prompt-l">Brain dump</div>' +
       '<div class="rc-prompt-t">Everything you remember about ' + esc(title) + '</div>' +
       '<div class="rc-prompt-s">Write it, or just say it out loud. Don\'t peek. When you\'re out, check yourself against the key points.</div></div>';
  h += '<textarea class="tb-ta" id="rc-ta" placeholder="Dump everything you\'ve got…">' + esc(rcText) + '</textarea>';

  if (!rcRevealed) {
    h += '<div class="q-btns" style="margin-top:12px"><button class="b-main" onclick="rcReveal()">Show the key points</button></div>';
  } else {
    var got = 0;
    rcKeys.forEach(function (k) { if (rcGot[k.h]) got++; });
    h += '<div class="rc-score">' + got + ' of ' + rcKeys.length + ' recalled — tap the ones you had</div>';
    rcKeys.forEach(function (k, i) {
      h += '<div class="rc-key' + (rcGot[k.h] ? ' got' : '') + '" onclick="rcTick(' + i + ')">' +
             '<div class="rc-box">✓</div>' +
             '<div><div class="rc-key-h">' + esc(k.h) + '</div>' +
             (k.p ? '<div class="rc-key-p">' + esc(k.p) + '</div>' : '') + '</div></div>';
    });
    h += '<div class="q-btns" style="margin-top:14px"><button class="b-main" style="flex:1;padding:13px;border-radius:12px;border:0;font-weight:700;cursor:pointer" onclick="acClose()">Back to modules</button></div>';
  }
  body.innerHTML = h;
}
function rcReveal() {
  var ta = document.getElementById('rc-ta'); if (ta) rcText = ta.value;
  rcRevealed = true; rcPaint();
}
function rcTick(i) {
  var k = rcKeys[i]; if (!k) return;
  rcGot[k.h] = !rcGot[k.h];
  rcPaint();
}

/* --------------------------------------------------------- SHARPEN (spaced + interleaved) */
function acMissAll()   { return acRead('academy-miss3', {}); }
function acMissWrite(o){ acWrite('academy-miss3', o); }
function acMissId(k, q){ var s = (k || '?') + '|' + acPlain(q), h = 5381, i; for (i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0; return 'm' + (h >>> 0); }
function acLogMiss(k, card) {
  if (!card || !card.q) return;
  var o = acMissAll(), id = acMissId(k, card.q);
  var prev = o[id] || {};
  o[id] = { k: k || '', q: card.q, a: card.a || '', n: (prev.n || 0) + 1, ts: Date.now() };
  acMissWrite(o);
}
function acClearMiss(k, q) {
  var o = acMissAll(), id = acMissId(k, q);
  if (o[id]) { delete o[id]; acMissWrite(o); }
}
function acMissCount() { return Object.keys(acMissAll()).length; }

function acMissDeck() {
  var o = acMissAll(), arr = [];
  Object.keys(o).forEach(function (id) { var r = o[id]; if (r && r.q) arr.push({ q: r.q, a: r.a, _key: r.k, _missId: id }); });
  return shuffle(arr);   // shuffle across modules = interleaving
}
function acSeedMix() {
  var out = [];
  Object.keys(A).forEach(function (k) {
    var cards = (A[k] && A[k].learn) || [];
    if (!cards.length) return;
    shuffle(cards.slice()).slice(0, 2).forEach(function (c) { out.push({ q: c.q, a: c.a, _key: k }); });
  });
  return shuffle(out).slice(0, 12);
}

function sharpenCardHtml() {
  var n = acMissCount();
  var sub = n
    ? n + ' card' + (n === 1 ? '' : 's') + ' from things you\'ve missed, mixed across every module.'
    : 'A quick mixed set pulled from every module. Spacing + mixing is what makes it stick.';
  return '<button class="sharpen" onclick="acOpenSharpen()">' +
           '<div class="sharpen-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></div>' +
           '<div><div class="sharpen-t">Sharpen</div><div class="sharpen-s">' + sub + '</div></div>' +
           '<div class="sharpen-n">' + (n ? n + ' due' : 'Warm up') + '</div>' +
         '</button>';
}

function acOpenSharpen() {
  var deck = acMissDeck(), seeded = false;
  if (!deck.length) { deck = acSeedMix(); seeded = true; }
  if (!deck.length) return;
  curKey = '__review'; curTab = 'sharpen';
  document.getElementById('ov-title').textContent = 'Sharpen';
  document.getElementById('ov-sub').textContent = seeded ? 'Mixed review across modules' : deck.length + ' to review';
  document.getElementById('ov-modes').style.display = 'none';
  document.getElementById('ov').classList.add('on');
  document.body.style.overflow = 'hidden';
  document.getElementById('ov-body').scrollTop = 0;
  qList = deck; qi = 0; qFlipped = false; qPicked = null; qRight = 0; qSeen = 0; qMissed = [];
  renderQuiz();
}

/* ------------------------------------------------------------ boot */
document.addEventListener('keydown', function (e) {
  if (e.key !== 'Escape') return;
  if (document.getElementById('lb').classList.contains('on')) acLbClose(null, 1);
  else if (document.getElementById('ov').classList.contains('on')) acClose();
});

acHome();
</script>
