/* ---------- number-column coaching (auto-wired, same engine as the case trainers) ----------
   Every Pred. / Best / %Pred. cell explains ITSELF. What the number is, not just what the
   row is called. Re-run after each render() because the report is rebuilt from scratch. */
function _bottles(v){ const n=v/2; return n.toFixed(1).replace(/\.0$/,''); }
function _sizeLine(unit,valStr){ if(!/^L$/i.test((unit||'').trim())) return ''; const v=parseFloat(valStr); if(!isFinite(v)) return ''; return `≈ ${_bottles(v)} two‑liter soda bottles of air`; }
const NUMDEF = {
  pred:{ t:'Predicted: the healthy target',
    d:(c)=>{ const s=_sizeLine(c.unit,c.val);
      return `<b>Predicted ${c.param} = ${c.val}${c.unit?' '+c.unit:''}.</b> What a <b>healthy</b> person matching this patient (age, height, sex, ethnicity) would be expected to hit, the bar this row is measured against.`
        + (s?`<span class="gref">Real-world size: ${s}. A healthy adult empties about 5 to 6 L, roughly three soda bottles, in one full breath.</span>`:''); } },
  best:{ t:'Best: what they actually blew',
    d:(c)=>{ const s=_sizeLine(c.unit,c.val), ps=_sizeLine(c.unit,c.pred);
      const pRef = c.pred ? ` A healthy match would be expected around <b>${c.pred}${c.unit?' '+c.unit:''}</b>${ps?` (${ps})`:''}.` : '';
      return `<b>${c.param} best = ${c.val}${c.unit?' '+c.unit:''}.</b> The patient's <b>own best real effort</b> on this test.${pRef}`
        + (s?`<span class="gref">Real-world size: ${s} in one breath.</span>`:''); } },
  pct:{ t:'% of Predicted: how far off',
    d:(c)=>`<b>${c.val} of predicted.</b> The best effort shown as a <b>share of the healthy target</b>, the fastest "how far off" read. Roughly <b>80% and up is the usual normal zone</b>; the lower it falls, the more this measure is underperforming.` }
};
function wireNumbers(){
  document.querySelectorAll('table').forEach(tbl=>{
    if(!tbl.tHead||!tbl.tHead.rows.length) return;
    const heads=[...tbl.tHead.rows[0].cells].map(c=>c.textContent.trim().toLowerCase());
    const unitIdx=heads.findIndex(h=>h.includes('unit'));
    const predIdx=heads.findIndex(h=>!h.includes('%')&&h.includes('pred'));
    const colType=heads.map(h=> h.includes('%')?'pct' : h.includes('pred')?'pred' : h.includes('best')?'best' : null);
    [...tbl.tBodies].forEach(tb=>[...tb.rows].forEach(row=>{
      const p0=row.cells[0]; if(!p0) return;
      const param=((p0.querySelector('.term')?.textContent)||p0.textContent).trim().replace(/\s+/g,' ');
      const unit=(unitIdx>-1&&row.cells[unitIdx])?row.cells[unitIdx].textContent.trim():'';
      const predVal=(predIdx>-1&&row.cells[predIdx])?row.cells[predIdx].textContent.trim():'';
      [...row.cells].forEach((cell,i)=>{
        const ct=colType[i]; if(!ct) return;
        if(cell.querySelector('.term')) return;
        const val=cell.textContent.trim();
        if(!val||val==='n/a'||val==='-') return;
        cell.classList.add('num');
        cell._num={col:ct,param,unit,val,pred:predVal};
      });
    }));
  });
}
function defFor(el){
  if(el.classList.contains('num')&&el._num){ const n=el._num, b=NUMDEF[n.col]; if(b) return {t:b.t, d:b.d(n)}; }
  const g=GLOSS[el.dataset.g]; if(g) return {t:g.t, d:g.d, ln:g.ln};
  return null;
}

let glossPinned=false;
function showGloss(el){
  const g=defFor(el); if(!g) return;

    <span class="gt">${g.t}</span><p class="gb">${g.d}</p>${g.ln?`<p class="gln">${g.ln}</p>`:''}`;

  const r=el.getBoundingClientRect();
  const gw=glossEl.offsetWidth, gh=glossEl.offsetHeight;
  let left=r.left; if(left+gw>window.innerWidth-10) left=window.innerWidth-10-gw;
  let top=r.bottom+8; if(top+gh>window.innerHeight-10) top=Math.max(10,r.top-gh-8);
  glossEl.style.left=Math.max(10,left)+'px'; glossEl.style.top=top+'px';
}

/* which glossary key does a clicked element stand for? Parameter names and section
   headings carry it on data-g; a NUMBER cell only knows its row's parameter, so it is
   translated back through the same PGLOSS map the labels use. Clicking "1.75" should
   light up the graph exactly like clicking the word FEV1 beside it. */
function spotKeyOf(el){
  if(el.dataset && el.dataset.g) return el.dataset.g;
  if(el._num) return PGLOSS[el._num.param];
  return null;
}

/* ---------- DRAG THE CHARTS. Reshape a loop, the numbers + verdict follow ---------- */
let drag=null;
const clampN=(v,lo,hi)=> Math.max(lo, Math.min(hi, v));
function svgUnits(svg,e){ const r=svg.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(360/r.width), y:(e.clientY-r.top)*(300/r.height) }; }
function applyDrag(e){
  if(!drag) return;
  /* ---- dragging a Z-SCORE dot: run the z math backwards ----
     z → %predicted → the actual measured value. Because every other panel is derived
     from D[], moving the dot ripples out to the tables, both graphs and the verdict for
     free. The ratio row owns no value of its own, so it moves FEV1 against a fixed FVC. */
  if(drag.chart==='z'){
    const hit=document.querySelector(`.zhit[data-h="z:${drag.param}"]`); if(!hit) return;
    const r=hit.getBoundingClientRect(); if(!r.width) return;
    const z=Math.max(ZG.zmin,Math.min(ZG.zmax, xToZ((e.clientX-r.left)*(ZG.W/r.width))));
    const pp=pctFromZ(z, zLLNfor(drag.param));
    if(drag.param==='ratio'){
      const targetRatio = pp/100*PRED.ratio;                    // %pred of the ratio → the ratio itself
      shapeLoopToFEV1(targetRatio/100*D.FVC);                   // reshape the loop, don't just retype FEV1
    } else if(drag.param==='FEV1'){
      shapeLoopToFEV1(pp/100*PRED.FEV1);                        // ditto: the graph has to agree
    } else {
      const v = clampN(pp/100*PRED[drag.param], 0.05, 99);
      D[drag.param]=v;
      if(drag.param==='FVC'){                                   // FVC is the loop's x-extent…
        if(D.FEV1>D.FVC) D.FEV1=D.FVC;
        D.FEV1=clampN(fev1FromLoop(D),0.05,D.FVC);              // …so re-read FEV1 off the new shape
      }
    }
    activePreset=null; markPresets(); syncFields(); render();
    return;
  }
  const svg=document.getElementById(drag.chart==='fv'?'fvSvg':'vtSvg'); if(!svg) return;
  const u=svgUnits(svg,e);
  if(drag.chart==='fv'){
    if(drag.param==='FVC'){                                  // ↔ total volume
      D.FVC = clampN((u.x-FVG.mL)/FVG.pw*FVG.xmax, 0.5, FVG.xmax);
    } else {                                                 // ↕ a flow
      const f = FVG.ymax - (u.y-FVG.mT)/FVG.ph*(FVG.ymax-FVG.ymin);
      D[drag.param] = clampN(f, 0.05, FVG.ymax);
    }
    // the loop's SHAPE now defines FEV1 (volume out in the first second) → drives the ratio & dx
    D.FEV1 = clampN(fev1FromLoop(D), 0.05, D.FVC);
  } else {                                                   // volume-time chart
    const vol = VTG.vmax - (u.y-VTG.mT)/VTG.ph*VTG.vmax;
    if(drag.param==='FEV1'){ shapeLoopToFEV1(clampN(vol, 0.05, D.FVC)); }  // loop must follow too
    else { D.FVC = clampN(vol, 0.3, VTG.vmax); if(D.FEV1>D.FVC) D.FEV1=D.FVC;
           D.FEV1 = clampN(fev1FromLoop(D), 0.05, D.FVC); }
  }
  activePreset=null; markPresets(); syncFields(); render();
}
document.addEventListener('pointerdown',e=>{

  const [chart,param]=h.getAttribute('data-h').split(':');

   avoids any rAF-throttle guard that could jam if a frame is ever dropped */
document.addEventListener('pointermove',e=>{

},{passive:false});

/* ---------- LIVE WIRING: smooth morph between states ---------------------------
   Clicking a pattern (top buttons, flowchart outcomes, or the guided tour) tweens
   every value from where it is now to the target over ~0.65s, re-rendering each
   frame. So you literally WATCH the loop, tables, verdict and z-scores transform,
   e.g. a normal lung caving into an asthmatic one. Typing and dragging stay instant
   (you're the one moving them); the morph is only for jumps between named patterns. */
let tween=null;
function animateTo(target, ms=680){
  if(tween){ cancelAnimationFrame(tween); tween=null; }
  // if the tab is hidden, rAF is paused. Jump straight to the target so the report is never left stale
  if(document.hidden){ D={...target}; syncFields(); FLASH=true; render(); return; }
  const from={...D};
  const keys=Object.keys(target).filter(k=>k!=='post' && typeof target[k]==='number');
  const start=performance.now();
  function frame(now){
    const t=Math.min(1,(now-start)/ms);
    const e = t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;   // easeInOutQuad
    keys.forEach(k=>{ const a=(typeof from[k]==='number')?from[k]:target[k]; D[k]=a+(target[k]-a)*e; });
    syncFields(); render();
    if(t<1){ tween=requestAnimationFrame(frame); }
    else { tween=null; D={...target}; syncFields(); FLASH=true; render(); }
  }
  tween=requestAnimationFrame(frame);
}

/* click any outcome box on the interpretation flowchart → drive to that pattern */
document.addEventListener('click',e=>{
  const b=e.target.closest('.end[data-dx]'); if(!b) return;
  const dx=b.getAttribute('data-dx'), target=DX_TARGET[dx]; if(!target) return;
  activePreset=DX_TO_PRESET[dx]; markPresets(); animateTo(target);
});

/* ---------- LIVE WIRING: change ripple + "what just changed" ticker ------------
   After a discrete change (type / drag-release / pattern jump) we diff the key
   read-outs against the last committed state, flash whatever moved, and post a
   one-line cause→effect ticker. During a drag or a morph's in-between frames we
   leave PREV alone, so the flash reflects the WHOLE gesture, not one frame of it. */
let PREV=null, FLASH=false, tickTimer=null;
function snapshot(){
  const r=ratio();
  return {
    dx: classify().dx,
    la: lungAge(),
    'flag:ratio': r<LLN_RATIO?'lo':'ok',
    'flag:FVC':  pct(D.FVC,PRED.FVC)<LLN_PCT?'lo':'ok',
    'flag:FEV1': pct(D.FEV1,PRED.FEV1)<LLN_PCT?'lo':'ok',
    'flag:TLC':  (pct(D.TLC,PRED.TLC)<LLN_PCT?'lo':pct(D.TLC,PRED.TLC)>115?'hi':'ok'),
    'flag:RV':   pct(D.RV,PRED.RV)>130?'hi':'ok',
    'flag:DLCO': pct(D.DLCO,PRED.DLCO)<LLN_DLCO?'lo':'ok',
    'z:FVC':  zOf(pct(D.FVC,PRED.FVC),80)<Z_LLN,
    'z:FEV1': zOf(pct(D.FEV1,PRED.FEV1),80)<Z_LLN,
    'z:TLC':  zOf(pct(D.TLC,PRED.TLC),80)<Z_LLN,
    'z:DLCO': zOf(pct(D.DLCO,PRED.DLCO),75)<Z_LLN,
    _num:{ FEV1:D.FEV1, FVC:D.FVC, ratio:r, TLC:D.TLC, DLCO:D.DLCO }
  };
}
function afterRender(){
  wireNumbers();                     // report was just rebuilt. Re-attach the per-number coaching
  const cur=snapshot();
  if(!PREV){ PREV=cur; return; }
  if(!FLASH) return;               // mid-drag / mid-morph frame → keep PREV as the last committed state
  const sel=[];
  Object.keys(cur).forEach(k=>{
    if(k==='_num') return;
    if(JSON.stringify(cur[k])===JSON.stringify(PREV[k])) return;
    if(k==='dx') sel.push('[data-cell="verdict"]','[data-cell="verdictline"]');
    else if(k==='la') sel.push('[data-cell="lungage"]');
    else sel.push(`[data-cell="${k}"]`);
  });
  if(sel.length){
    requestAnimationFrame(()=>document.querySelectorAll(sel.join(',')).forEach(el=>{
      el.classList.remove('justchanged'); void el.offsetWidth; el.classList.add('justchanged');
    }));
  }
  showTicker(PREV,cur);
  PREV=cur; FLASH=false;
}
function showTicker(prev,cur){
  const el=document.getElementById('tickin'); if(!el) return;
  const n=cur._num, p=prev._num, parts=[];
  const mv=(k,dp,suf)=>{ const thr = k==='ratio'?1 : k==='DLCO'?0.3 : 0.03;
    if(Math.abs(n[k]-p[k])>=thr) parts.push(`${LABK[k]} ${p[k].toFixed(dp)}${suf}<span class="arr">→</span><b>${n[k].toFixed(dp)}${suf}</b>`); };
  mv('FEV1',2,''); mv('FVC',2,''); mv('ratio',0,'%'); mv('TLC',2,''); mv('DLCO',1,'');
  const dxChanged = prev.dx!==cur.dx;
  if(!dxChanged && !parts.length) return;
  let html = dxChanged ? `<span class="tk">Now reads</span> <b>${DXNAME[cur.dx]||cur.dx}</b>` : `<span class="tk">Live</span>`;
  if(parts.length) html += ' &nbsp; '+parts.slice(0,3).join(' &nbsp;·&nbsp; ');
  el.innerHTML=html; el.classList.add('show');
  if(tickTimer) clearTimeout(tickTimer);
  tickTimer=setTimeout(()=>el.classList.remove('show'), 3800);
}

/* ---------- "BREATHE IT". Ride the loop and narrate one full breath ----------
   The whole shape is ONE breath, and the climb off zero is the blow-OUT (not the
   breath in). The thing people miss. A marker travels the patient's loop while
   the trace draws itself on: full lungs → BLAST out (the climb) → squeeze empty →
   pull it all back IN (the bottom curve). No D values change, so this never calls
   render(); and render() (from any real edit) calls stopBreathe(), so the loop
   animation and the live re-render can never fight over the DOM. */
let breatheRAF=null, breathing=false;
const HOLD=1600, EXH=4200, INH=3400;            // ms: lungs-full beat, blow out, breathe back in (slow enough to READ)
const PUSH_AT=0.5;                              // fraction along the exhale where "EXHALE" hands off to the blinking "PUSH!" (the descent to empty)
function setHint(html){ const h=document.getElementById('bHint'); if(h) h.innerHTML=html; }
const HINT_IDLE='Press ▶: the panel glows <b style="color:#2563eb">blue as you blow OUT</b> (the line shoots up because you\'re fast, not because you\'re inhaling) and <b style="color:#d97706">amber as you breathe IN</b>.';
/* tint the WHOLE graph panel + set the big word behind the loop, synced to the marker.
   blue = blowing OUT, amber = breathing IN, grey = lungs full & holding. */
/* shrink the big word until it fits its panel, long phrases ("KEEP SQUEEZING",
   "DEEP BREATH IN") otherwise overflow the card and get clipped to "EEP SQUEEZING" */
function fitWord(w){
  if(!w) return;
  w.style.fontSize='';                                   // reset to the CSS clamp, then measure
  const st=w.parentElement; if(!st||!w.textContent) return;
  const max=st.clientWidth-20;
  const cur=w.scrollWidth;
  if(cur>max){ const fs=parseFloat(getComputedStyle(w).fontSize);
    w.style.fontSize=Math.max(15, fs*max/cur)+'px'; }
}
function setBreath(mode){
  const st=document.getElementById('fvStage'); if(!st) return;
  st.classList.remove('ready','exhale','inhale','push'); if(mode) st.classList.add(mode);
  const w=document.getElementById('bWord');
  if(w){ w.textContent = mode==='exhale' ? 'EXHALE' : mode==='push' ? 'PUSH!' : mode==='inhale' ? 'INHALE' : 'LUNGS FULL'; fitWord(w); }
}
function stopBreathe(){
  if(breatheRAF){ cancelAnimationFrame(breatheRAF); breatheRAF=null; }
  breathing=false; document.body.classList.remove('breathing');
  const exp=document.getElementById('fvExp'), insp=document.getElementById('fvInsp');
  if(exp){ exp.style.strokeDasharray=''; exp.style.strokeDashoffset=''; }   // restore the full loop
  if(insp){ insp.style.strokeDasharray=''; insp.style.strokeDashoffset=''; }
  const dot=document.getElementById('breathDot'); if(dot) dot.style.opacity='';
  setBreath(null);                                                          // clear the wash + word
  const b=document.getElementById('breatheBtn');
  if(b){ b.classList.remove('playing'); b.textContent='▶ Breathe it: watch one full breath'; }
  setHint(HINT_IDLE);
}
function startBreathe(){
  const svg=document.getElementById('fvSvg');
  const exp=document.getElementById('fvExp'), insp=document.getElementById('fvInsp'), dot=document.getElementById('breathDot');
  if(!svg||!exp||!insp||!dot) return;
  const expLen=exp.getTotalLength(), inspLen=insp.getTotalLength();
  exp.style.strokeDasharray=expLen;  exp.style.strokeDashoffset=expLen;    // hide, then draw-on as we pass
  insp.style.strokeDasharray=inspLen; insp.style.strokeDashoffset=inspLen;
  const o=exp.getPointAtLength(0);                                         // origin = lungs full, flow 0
  dot.setAttribute('cx',o.x); dot.setAttribute('cy',o.y); dot.style.opacity=1;
  breathing=true; document.body.classList.add('breathing');
  const b=document.getElementById('breatheBtn'); if(b){ b.classList.add('playing'); b.textContent='⏸ Stop'; }
  setBreath('ready'); setHint('▶ Playing: the whole panel lights up with each phase.');
  let phase='', start=performance.now(); const total=HOLD+EXH+INH;
  function frame(now){
    if(!exp.isConnected){ stopBreathe(); return; }        // SVG re-rendered from under us, bail
    const el=now-start;
    if(el>=total){                                        // done. Full loop drawn, marker resting at origin
      exp.style.strokeDashoffset=0; insp.style.strokeDashoffset=0;
      const pe=insp.getPointAtLength(inspLen); dot.setAttribute('cx',pe.x); dot.setAttribute('cy',pe.y);
      setBreath(null);
      breatheRAF=null; breathing=false; document.body.classList.remove('breathing');
      if(b){ b.classList.remove('playing'); b.textContent='▶ Breathe it again'; }
      setHint('<b>That\'s one full breath.</b> Blue was you blowing OUT (the whole top curve), amber was breathing back IN. ▶ to run it again.');
      return;
    }
    if(el<HOLD){
      if(phase!=='ready'){ phase='ready'; setBreath('ready'); }   // lungs full, nothing drawn yet
    } else if(el<HOLD+EXH){
      const p=(el-HOLD)/EXH;                              // along the exhale (top curve), blue
      exp.style.strokeDashoffset=expLen*(1-p);
      const pt=exp.getPointAtLength(expLen*p);
      dot.setAttribute('cx',pt.x); dot.setAttribute('cy',pt.y);
      const want = p>=PUSH_AT ? 'push' : 'exhale';       // tail of the blow (riding down to empty) → blinking "PUSH!"
      if(phase!==want){ phase=want; setBreath(want);
        setHint(want==='push'
          ? 'Almost empty: <b style="color:#1d4ed8">keep going: push, push, push!</b> In a real test the tech is shouting for every last bit of air. That long tail is the whole story in COPD.'
          : '<b style="color:#2563eb">Blowing OUT</b>, hard and fast. The line rockets up because you\'re FAST, not because you\'re breathing in.'); }
    } else {
      const p=(el-HOLD-EXH)/INH;                          // along the inhale (bottom curve), amber
      insp.style.strokeDashoffset=inspLen*(1-p);
      const pt=insp.getPointAtLength(inspLen*p);
      dot.setAttribute('cx',pt.x); dot.setAttribute('cy',pt.y);
      if(phase!=='inhale'){ phase='inhale'; setBreath('inhale'); }
    }
    breatheRAF=requestAnimationFrame(frame);
  }
  breatheRAF=requestAnimationFrame(frame);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#breatheBtn')) return;
  if(breathing) stopBreathe(); else startBreathe();
});

/* ---------- "BLOW IT OUT". Narrate the volume-time curve as one long blow ----------
   Same contract as "Breathe it": touches only styles/attributes, never D, so it never
   triggers render(); and render() calls stopBlow(), so a live edit always wins.
   Chart time is remapped so the first second (the FEV1 blast) plays in slow motion
   and the long flat squeeze doesn't drag. */
let blowRAF=null, blowing=false;
const B_HOLD=1800, B_BLAST=2600, B_SQUEEZE=3600;   // ms: deep-breath beat, chart 0→1s, chart 1s→end
function setBlowHint(html){ const h=document.getElementById('blowHint'); if(h) h.innerHTML=html; }
function setBlow(mode){
  const st=document.getElementById('vtStage'); if(!st) return;
  st.classList.remove('ready','exhale','inhale','squeeze'); if(mode) st.classList.add(mode);
  const w=document.getElementById('vtWord');
  if(w){ w.textContent = mode==='inhale' ? 'DEEP BREATH IN' : mode==='exhale' ? 'BLAST!' : mode==='squeeze' ? 'KEEP SQUEEZING' : ''; fitWord(w); }
}
function stopBlow(){
  if(blowRAF){ cancelAnimationFrame(blowRAF); blowRAF=null; }
  blowing=false; document.body.classList.remove('blowing');
  const pat=document.getElementById('vtPat');
  if(pat){ pat.style.strokeDasharray=''; pat.style.strokeDashoffset=''; }
  const dot=document.getElementById('blowDot'); if(dot) dot.style.opacity='';
  setBlow(null);
  const b=document.getElementById('blowBtn');
  if(b){ b.classList.remove('playing'); b.textContent='▶ Blow it out: watch the whole 6-second blow'; }
  setBlowHint(BLOW_IDLE);
}
function startBlow(){
  const pat=document.getElementById('vtPat'), dot=document.getElementById('blowDot');
  if(!pat||!dot) return;
  /* same math as vtPath, so the dot rides exactly on the drawn line */
  const r=D.FEV1/D.FVC, tau=-1/Math.log(Math.max(0.05, 1-Math.min(0.98,r)));
  const volAt=t=> D.FVC*(1-Math.exp(-t/tau));
  /* cumulative path length at each chart-time sample → dashoffset that draws on in sync */
  const samples=[{t:0,x:vtX(0),y:vtY(0),len:0}];
  for(let t=0.05;t<=VTG.tmax;t+=0.1){
    const p=samples[samples.length-1], x=vtX(t), y=vtY(volAt(t));
    samples.push({t,x,y,len:p.len+Math.hypot(x-p.x,y-p.y)});
  }
  const totalLen=samples[samples.length-1].len;
  const lenAt=tc=>{
    for(let i=1;i<samples.length;i++) if(samples[i].t>=tc){
      const a=samples[i-1], b2=samples[i], f=(tc-a.t)/(b2.t-a.t);
      return a.len+(b2.len-a.len)*f;
    }
    return totalLen;
  };
  pat.style.strokeDasharray=totalLen; pat.style.strokeDashoffset=totalLen;   // hide, then draw on
  dot.setAttribute('cx',vtX(0)); dot.setAttribute('cy',vtY(0)); dot.style.opacity=1;
  blowing=true; document.body.classList.add('blowing');
  const b=document.getElementById('blowBtn'); if(b){ b.classList.add('playing'); b.textContent='⏸ Stop'; }
  setBlow('inhale');
  setBlowHint('First, suck in every bit of air you can hold. The chart hasn\'t started yet: the clock starts the instant you blow.');
  let phase='inhale', start=performance.now(); const total=B_HOLD+B_BLAST+B_SQUEEZE;
  function frame(now){
    if(!pat.isConnected){ stopBlow(); return; }          // SVG re-rendered from under us, bail
    const el=now-start;
    if(el>=total){                                       // done. Full curve drawn, dot at the flat top
      pat.style.strokeDashoffset=0;
      const last=samples[samples.length-1];
      dot.setAttribute('cx',last.x); dot.setAttribute('cy',last.y);
      setBlow(null);
      blowRAF=null; blowing=false; document.body.classList.remove('blowing');
      if(b){ b.classList.remove('playing'); b.textContent='▶ Blow it out again'; }
      setBlowHint('<b>That\'s the whole test.</b> Steep start = open airways (the height at the red line is <b>FEV1</b>). The flat top = tank empty. That height is <b>FVC</b>, every drop you had. Blocked airways turn the rocket into a slow, dragged-out climb.');
      return;
    }
    let tc;                                              // chart time for this frame
    if(el<B_HOLD){ tc=0;
      if(phase!=='inhale'){ phase='inhale'; setBlow('inhale'); }
    } else if(el<B_HOLD+B_BLAST){ tc=(el-B_HOLD)/B_BLAST;         // 0→1s in slow motion
      if(phase!=='exhale'){ phase='exhale'; setBlow('exhale');
        setBlowHint('<b>GO: blast it out!</b> The line rockets up because air is <b>pouring out of you</b>. Where it crosses the red dashed line: that\'s <b>FEV1</b>: everything you got rid of in second one.'); }
    } else { tc=1+(el-B_HOLD-B_BLAST)/B_SQUEEZE*(VTG.tmax-1);     // 1s→end
      if(phase!=='squeeze'){ phase='squeeze'; setBlow('squeeze');
        setBlowHint('<b>Keep pushing, don\'t stop!</b> The line flattens because you\'re <b>running out of air</b>, not because you quit. Where it levels off = <b>FVC</b>, your total air.'); }
    }
    pat.style.strokeDashoffset=Math.max(0, totalLen-lenAt(tc));
    dot.setAttribute('cx',vtX(tc)); dot.setAttribute('cy',vtY(volAt(tc)));
    blowRAF=requestAnimationFrame(frame);
  }
  blowRAF=requestAnimationFrame(frame);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#blowBtn')) return;
  if(blowing) stopBlow(); else startBlow();
});

/* ---------- init ---------- */
buildPresets(); buildFields(); buildPatient(); markPresets(); render();
</script>
</body>
